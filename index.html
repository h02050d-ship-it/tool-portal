<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f3f5f9">
<meta name="description" content="林材木店の自作業務ツールを一画面に集約した社内ツール集">
<title>林材木店 社内ツール集</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2300acc1'/><text x='50' y='50' font-size='72' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='white' font-family='sans-serif'>ツ</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2300acc1'/><text x='50' y='50' font-size='62' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='white' font-family='sans-serif'>ツ</text></svg>">
<style>
  :root{
    --bg:#f3f5f9; --panel:#ffffff; --panel2:#f7f9fc; --line:#e3e8f0;
    --text:#1b2330; --sub:#5d6b80; --accent:#2f6bff; --accent2:#2257d6;
    --danger:#e0475a; --ok:#1fae7f; --chip:#eef2f8;
    --radius:14px; --shadow:0 6px 18px rgba(20,40,80,.10);
  }
  [data-theme="dark"]{
    --bg:#0f1218; --panel:#171c26; --panel2:#1e2430; --line:#2a3140;
    --text:#e8ecf3; --sub:#9aa6b8; --accent:#4f8cff; --accent2:#3b6fd4;
    --danger:#ff5d6c; --ok:#33d39a; --chip:#222b3a; --shadow:0 6px 20px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",system-ui,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh}
  header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg),rgba(0,0,0,0));
    backdrop-filter:blur(6px);padding:14px 22px 10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{font-size:20px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
  .brand .dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .search{flex:1;min-width:200px;max-width:520px;display:flex;align-items:center;gap:8px;
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:8px 14px}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px}
  .btn{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--text);
    border-radius:10px;padding:9px 13px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;
    transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 9px;font-size:13px}
  main{padding:6px 18px 24px;max-width:820px;margin:0 auto}
  header{max-width:820px;margin:0 auto}
  .cat{margin:12px 0}
  .cat-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--line)}
  .cat-handle{cursor:grab;color:var(--sub);font-size:15px;user-select:none}
  .cat-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
  .cat-emoji{font-size:16px}
  .cat-count{font-size:11px;color:var(--sub);background:var(--chip);padding:1px 8px;border-radius:999px}
  .cat-actions{margin-left:auto;display:flex;gap:6px;opacity:.55;transition:.15s}
  .cat:hover .cat-actions{opacity:1}
  .grid{display:flex;flex-direction:column;gap:6px;min-height:40px}
  .grid.dragover{outline:2px dashed var(--accent);outline-offset:5px;border-radius:10px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:11px;
    box-shadow:var(--shadow);overflow:hidden}
  .card:hover{transform:translateY(-1px);border-color:var(--accent)}
  .card.dragging{opacity:.4}
  .icon{width:30px;height:30px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-size:17px;background:var(--panel2);border:1px solid var(--line);overflow:hidden}
  .icon img{width:100%;height:100%;object-fit:cover}
  .card-body{flex:1;min-width:0;display:flex;align-items:baseline;gap:4px 12px;flex-wrap:wrap}
  .card-name{font-size:13.5px;font-weight:700;line-height:1.3;white-space:nowrap}
  .card-desc{font-size:12px;color:var(--sub);line-height:1.4;flex:1;min-width:180px;word-break:break-word}
  .card-tools{position:absolute;top:4px;right:4px;display:flex;gap:4px;opacity:0;transition:.15s;pointer-events:none}
  .card:hover .card-tools{opacity:1;pointer-events:auto}
  @media(hover:none){.card-tools{opacity:.6;pointer-events:auto}}
  .ic-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--sub)}
  .ic-btn:hover{color:var(--text);border-color:var(--accent)}
  .add-card{border:2px dashed var(--line);background:transparent;align-items:center;justify-content:center;
    color:var(--sub);font-weight:700;font-size:13px;min-height:38px;box-shadow:none}
  .add-card:hover{color:var(--accent);border-color:var(--accent)}
  .empty{color:var(--sub);text-align:center;padding:50px 20px}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .ov.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(460px,100%);
    padding:22px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 16px;font-size:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--sub);margin-bottom:6px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .emoji-pick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .emoji-pick span{cursor:pointer;font-size:20px;padding:4px 6px;border-radius:8px;border:1px solid transparent}
  .emoji-pick span:hover{border-color:var(--accent);background:var(--panel2)}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .modal-actions .btn{flex:1;justify-content:center}
  .modal-actions .btn.danger{color:var(--danger);border-color:var(--danger)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel);
    border:1px solid var(--accent);padding:11px 18px;border-radius:10px;box-shadow:var(--shadow);
    z-index:60;opacity:0;transition:.25s;pointer-events:none;font-size:14px}
  .toast.show{opacity:1}
  .hint{font-size:12px;color:var(--sub);margin-top:-6px;margin-bottom:14px}
  @media(max-width:600px){ main{padding:8px 12px 80px} header{padding:12px} }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>林材木店 社内ツール集</div>
  <div class="search">
    🔍<input id="search" placeholder="ツール名・説明で検索…" autocomplete="off">
  </div>
  <button class="btn ghost sm" id="themeBtn" title="テーマ切替">🌙</button>
  <button class="btn sm" id="addCatBtn">＋ カテゴリ</button>
  <button class="btn sm" id="exportBtn" title="バックアップ書き出し">⤓ 保存</button>
  <button class="btn sm" id="importBtn" title="バックアップ読み込み">⤒ 復元</button>
  <input type="file" id="importFile" accept="application/json" hidden>
</header>
<main id="main"></main>

<!-- Tool modal -->
<div class="ov" id="toolOv">
  <div class="modal">
    <h3 id="toolTitle">ツールを追加</h3>
    <div class="field"><label>名前</label><input id="t_name" placeholder="例：見積書作成ツール"></div>
    <div class="field"><label>URL / リンク</label><input id="t_url" placeholder="https://… / ドライブのリンク"></div>
    <div class="hint">GoogleドライブのフォルダやファイルのURLもそのまま貼れます。</div>
    <div class="field"><label>説明（任意）</label><input id="t_desc" placeholder="例：商品＋送料で見積書を自動作成"></div>
    <div class="field"><label>カテゴリ</label><select id="t_cat"></select></div>
    <div class="field"><label>アイコン（絵文字、空欄ならサイトのアイコン自動）</label>
      <input id="t_icon" placeholder="例：🍼" maxlength="4">
      <div class="emoji-pick" id="emojiPick"></div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="t_delete" style="display:none">削除</button>
      <button class="btn" id="t_cancel">キャンセル</button>
      <button class="btn primary" id="t_save">保存</button>
    </div>
  </div>
</div>

<!-- Category modal -->
<div class="ov" id="catOv">
  <div class="modal">
    <h3 id="catTitle">カテゴリを追加</h3>
    <div class="field"><label>絵文字</label><input id="c_emoji" placeholder="📁" maxlength="4">
      <div class="emoji-pick" id="catEmojiPick"></div>
    </div>
    <div class="field"><label>カテゴリ名</label><input id="c_name" placeholder="例：仕事ツール"></div>
    <div class="modal-actions">
      <button class="btn danger" id="c_delete" style="display:none">削除</button>
      <button class="btn" id="c_cancel">キャンセル</button>
      <button class="btn primary" id="c_save">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS_KEY = "tool_portal_v1";
const SEED_VERSION = 20; // 既存データへ新ツール追加/不要ツール除去/説明文更新を一度だけ反映する版数
// 一度だけ自動削除する（プライベート系・個人向けは登録しない方針。よく使うリンクは廃止）
const REMOVED_URLS = [
  "https://h02050d-ship-it.github.io/miracosta-dashboard/",
  "https://h02050d-ship-it.github.io/kawaji-hotel/",
  "https://h02050d-ship-it.github.io/baby-log/",
  "https://drive.google.com/",
  "https://mail.google.com/",
];
const REMOVED_CATS = ["旅行・おでかけ","暮らし・家族","よく使うリンク"];
const uid = () => Math.random().toString(36).slice(2,9);
const EMOJIS = ["📊","💰","📦","🚚","📝","🌲","📷","📧","✅","📁","🔗","🧮","📈","🛒","🏢","⚙️","🤖","🧾","📞","💡","🔔","🗂️","🌐","🔪","🗓️","🧹","📖","📠"];

const DEFAULT = {
  theme:"light",
  seedVersion:SEED_VERSION,
  cats:[
    {id:uid(), emoji:"🌲", name:"林材木店・仕事", tools:[
      {id:uid(), name:"売れ行き＆在庫ボード", url:"https://h02050d-ship-it.github.io/salesboard/", desc:"楽天・ヤフーの売れ行きと在庫がひと目でわかる。スプシと双方向同期で編集もそのまま反映", icon:"📊"},
      {id:uid(), name:"受注・問い合わせ管理", url:"https://h02050d-ship-it.github.io/order-desk/", desc:"楽天・ヤフー・市場の注文と問い合わせを一画面で処理。対応漏れを防げる", icon:"🛒"},
      {id:uid(), name:"西濃送り状デスク", url:"https://h02050d-ship-it.github.io/seino-desk/", desc:"EC以外（市場・電話・持込）の送り状を取引先を選ぶだけで即発行。支店止めにも対応", icon:"🚚"},
      {id:uid(), name:"見積書作成", url:"https://h02050d-ship-it.github.io/fare-calculator/mitsumori.html", desc:"商品と送料を選ぶだけでA4見積書が完成。送料計算も自動", icon:"🧾"},
      {id:uid(), name:"納品書作成", url:"https://h02050d-ship-it.github.io/nouhinsho/", desc:"納品書をその場で作成してPDF化。手書き・転記が不要になる", icon:"📦"},
      {id:uid(), name:"運賃計算ツール", url:"https://h02050d-ship-it.github.io/fare-calculator/", desc:"商品と行き先を入れるだけで送料を即計算。電話中の送料回答が速くなる", icon:"🧮"},
      {id:uid(), name:"加工予定表", url:"https://h02050d-ship-it.github.io/kakou-yotei/", desc:"加工場の予定を一覧管理。納品書連携で出荷完了まで一気通貫", icon:"🗓️"},
      {id:uid(), name:"現場作業ボード", url:"https://h02050d-ship-it.github.io/genba-board/", desc:"今日の割振りとノルマが全員に見える。先々の負荷シミュレーションもできる", icon:"📝"},
      {id:uid(), name:"現場呼出（LINE）", url:"https://h02050d-ship-it.github.io/genba-call/", desc:"ワンタップで加工場へLINE呼出。人を探しに行く手間がなくなる", icon:"📞"},
      {id:uid(), name:"FAXデスク", url:"https://h02050d-ship-it.github.io/fax-desk/", desc:"メール感覚でFAX送信（取引先選択・件名・添付）。受信FAXの返信漏れも防げる", icon:"📠"},
      {id:uid(), name:"林材木店 HP", url:"https://hayazai.com/", desc:"自社ホームページ。製品情報・価格のご案内はここから", icon:"🌲"},
    ]},
    {id:uid(), emoji:"📊", name:"経営・書類", tools:[
      {id:uid(), name:"振込照合デスク", url:"https://h02050d-ship-it.github.io/furikomi-check/", desc:"毎月15日の遠州信金 総合振込：WEB-FB取込用CSVのダウンロードと請求書照合チェック", icon:"振"},
      {id:uid(), name:"在庫推定・適正在庫", url:"https://h02050d-ship-it.github.io/salesboard/tekisei.html", desc:"全社の在庫額を月次で推定し、原板の規格別に需給・スポット購入の目安を提示。仕入れ判断に使える", icon:"🎯"},
      {id:uid(), name:"経営日報", url:"https://h02050d-ship-it.github.io/keiei-nippou/", desc:"売上・資金繰り予測・顧客動向を毎朝1画面でチェックできる経営コックピット", icon:"📈"},
      {id:uid(), name:"書類自動保存ボード", url:"https://h02050d-ship-it.github.io/doc-board/", desc:"請求書・領収書が自動保存できているかひと目で確認。取りこぼしに気づける", icon:"🗂️"},
    ]},
    {id:uid(), emoji:"⚙️", name:"生産・設備", tools:[
      {id:uid(), name:"改善リスト", url:"https://h02050d-ship-it.github.io/kaizen-list/", desc:"現場・事務のムダを見つけたらすぐ書き留めて、洗い出し→対策中→効果確認→完了まで対策の進み具合をみんなで管理できる", icon:"💡"},
      {id:uid(), name:"モルダー修正ボード", url:"https://h02050d-ship-it.github.io/kaizen/", desc:"モルダー加工のうち何枚が修正行きか記録するだけで修正率が見える。刃物管理の加工実績から2タップで入力でき、原板仕分けの効果比較や改善リストで改善に役立てられる", icon:"🪚"},
      {id:uid(), name:"モルダー刃物 使用量管理", url:"https://h02050d-ship-it.github.io/molder-hamono/", desc:"刃物の使用量を記録して、研磨・交換のタイミングを逃さない", icon:"🔪"},
      {id:uid(), name:"モルダー軸位置管理", url:"https://h02050d-ship-it.github.io/molder/", desc:"段取り替えの軸位置を記録。次に同じ製品を挽くときのセットが速くなる", icon:"⚙️"},
      {id:uid(), name:"工場清掃ボード", url:"https://h02050d-ship-it.github.io/seiso/", desc:"今日やる清掃が自動で並ぶ。チェックするだけで次回期日も自動計算", icon:"🧹"},
    ]},
    {id:uid(), emoji:"✅", name:"管理・タスク", tools:[
      {id:uid(), name:"社内通知 設定", url:"https://h02050d-ship-it.github.io/notify-settings/", desc:"誰に・どの通知（現場呼出/タスク/要返信メール/刃物交換ほか）を受け取るか人ごとに選べる。増えすぎたLINE通知を絞れる", icon:"📣"},
      {id:uid(), name:"会社タスク管理", url:"https://h02050d-ship-it.github.io/task-manager/", desc:"会社全体のタスクを全員で共有。やり忘れ・言った言わないを防ぐ", icon:"✅"},
      {id:uid(), name:"社内ルールブック", url:"https://h02050d-ship-it.github.io/rulebook/", desc:"「磐田市場は10束以下で送料2,000円」等の社内ルールをすぐ検索・全員で共有", icon:"📖"},
    ]},    {id:uid(), emoji:"📦", name:"営業・市場", tools:[
      {id:uid(), name:"HPアクセス分析", url:"https://h02050d-ship-it.github.io/hp-analytics/", desc:"hayazai.comの訪問数・人気ページ・流入元・LINEやAIチャット等の反応をGA4から見やすく確認できる", icon:"📊"},
      {id:uid(), name:"内藤運輸 配送実績Web", url:"https://h02050d-ship-it.github.io/naito-view/", desc:"内藤運輸への配送実績（束数）を直近1ヶ月ぶんWeb表示。毎月の請求束数の裏付けをFAXなしで共有・確認できる（合言葉naito0538）", icon:"🚚"},
      {id:uid(), name:"市場管理ボード", url:"https://h02050d-ship-it.github.io/ichiba-kanri/", desc:"市場ごとの売上・手数料率・預け在庫・滞留年数・不足在庫・内藤運賃を1画面で把握でき、AI取込の数字を書類と突合確認できる", icon:"🏬"},
      {id:uid(), name:"木取り判断ツール", url:"https://h02050d-ship-it.github.io/salesboard/kidori.html", desc:"4m原板を切るか丸のまま売るか、手間賃・需給・在庫から採算を判定。推奨切断量まで出る", icon:"🪚"},
      {id:uid(), name:"市場向け 価格・在庫・見積ツール", url:"https://h02050d-ship-it.github.io/fare-calculator/ichiba/tool.html", desc:"市場さまが取引条件どおりの価格表・リアルタイム在庫・運賃込み見積をその場で確認でき、正式見積依頼・注文までワンタップで完了する", icon:"🏪"},
    ]},

  ]
};

let data = load();

function load(){
  let v=null;
  try{ v = JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){}
  if(!v || !v.cats) return JSON.parse(JSON.stringify(DEFAULT));
  // 既存データに、まだ無い新ツールだけを一度だけ追加（URLで重複判定／削除済みは復活させない）
  if(v.seedVersion !== SEED_VERSION){ try{
    const existingUrls = new Set();
    v.cats.forEach(c=> c.tools.forEach(t=> existingUrls.add((t.url||'').replace(/\/$/,''))));
    DEFAULT.cats.forEach(dc=>{
      let cat = v.cats.find(c=> c.name===dc.name);
      if(!cat){ cat={id:uid(), emoji:dc.emoji, name:dc.name, tools:[]}; v.cats.push(cat); }
      dc.tools.forEach(dt=>{
        if(!existingUrls.has((dt.url||'').replace(/\/$/,''))){
          cat.tools.push({id:uid(), name:dt.name, url:dt.url, desc:dt.desc, icon:dt.icon});
          existingUrls.add((dt.url||'').replace(/\/$/,''));
        }
      });
    });
    // 不要ツール（プライベート/旅行系）を一度だけ除去
    const rm = new Set(REMOVED_URLS.map(u=>u.replace(/\/$/,'')));
    v.cats.forEach(c=> c.tools = c.tools.filter(t=> !rm.has((t.url||'').replace(/\/$/,''))));
    v.cats = v.cats.filter(c=> !(REMOVED_CATS.includes(c.name) && c.tools.length===0));
    // 説明文を最新シードの文面に一度だけ同期（URL一致のみ）
    const descMap = new Map();
    DEFAULT.cats.forEach(dc=> dc.tools.forEach(dt=> descMap.set((dt.url||'').replace(/\/$/,''), dt.desc)));
    v.cats.forEach(c=> c.tools.forEach(t=>{ const d=descMap.get((t.url||'').replace(/\/$/,'')); if(d) t.desc=d; }));
    // ツール改名を一度だけ反映（URL一致のみ。2026-07-17 効率化ボード→モルダー修正ボード）
    const renameMap = new Map([["https://h02050d-ship-it.github.io/kaizen",{name:"モルダー修正ボード",icon:"🪚"}]]);
    v.cats.forEach(c=> c.tools.forEach(t=>{ const r=renameMap.get((t.url||'').replace(/\/$/,'')); if(r){ t.name=r.name; t.icon=r.icon; } }));
    v.seedVersion = SEED_VERSION;
    localStorage.setItem(LS_KEY, JSON.stringify(v));
  }catch(e){} }
  return v;
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(data)); }
let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600); }
function host(url){ try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return ''; } }
function favicon(url){ try{ const h=new URL(url).hostname; return `https://www.google.com/s2/favicons?domain=${h}&sz=64`; }catch(e){ return ''; } }

/* ---------- render ---------- */
const main = document.getElementById('main');
let filter = "";

function render(){
  document.body.setAttribute('data-theme', data.theme);
  document.getElementById('themeBtn').textContent = data.theme==='dark' ? '🌙' : '☀️';
  main.innerHTML = "";
  const f = filter.trim().toLowerCase();
  let shown = 0;
  data.cats.forEach(cat=>{
    const tools = cat.tools.filter(t => !f || (t.name+' '+(t.desc||'')+' '+t.url).toLowerCase().includes(f));
    if(f && tools.length===0) return;
    shown += tools.length;
    const sec = document.createElement('section');
    sec.className='cat'; sec.dataset.cat=cat.id;
    sec.innerHTML = `
      <div class="cat-head">
        <span class="cat-handle" draggable="true" title="ドラッグでカテゴリ並び替え">⠿</span>
        <span class="cat-title"><span class="cat-emoji">${escapeHtml(cat.emoji)||'📁'}</span>${escapeHtml(cat.name)}</span>
        <span class="cat-count">${tools.length}</span>
        <span class="cat-actions">
          <button class="ic-btn" data-act="editcat" title="編集">✎</button>
        </span>
      </div>
      <div class="grid" data-cat="${cat.id}"></div>`;
    const grid = sec.querySelector('.grid');
    tools.forEach(t=> grid.appendChild(cardEl(t, cat.id)));
    // add card
    const add = document.createElement('div');
    add.className='card add-card';
    add.innerHTML = `＋ ツール追加`;
    add.onclick = ()=> openTool(null, cat.id);
    grid.appendChild(add);
    main.appendChild(sec);
    setupGridDnD(grid, cat.id);
    setupCatDnD(sec, cat.id);
  });
  if(f && shown===0){ main.innerHTML = `<div class="empty">「${escapeHtml(filter)}」に一致するツールはありません</div>`; }
}

function cardEl(t, catId){
  const el = document.createElement('div');
  el.className='card'; el.draggable=!filter.trim(); el.dataset.id=t.id; el.dataset.cat=catId;
  el.title = (t.desc? t.desc+'\n':'') + (t.url||'');
  const ic = t.icon ? `<div class="icon">${escapeHtml(t.icon)}</div>`
    : `<div class="icon"><img draggable="false" src="${favicon(t.url)}" onerror="this.parentNode.textContent='🔗'"></div>`;
  el.innerHTML = `
    <div class="card-tools">
      <span class="ic-btn" data-act="edit" title="編集">✎</span>
    </div>
    ${ic}<div class="card-body"><div class="card-name">${escapeHtml(t.name)}</div>${t.desc?`<div class="card-desc">${escapeHtml(t.desc)}</div>`:''}</div>`;
  el.onclick = (e)=>{
    if(e.target.dataset.act==='edit'){ openTool(t.id, catId); return; }
    if(t.url) window.open(t.url, '_blank', 'noopener');
  };
  el.onauxclick = (e)=>{ if(e.button===1 && t.url) window.open(t.url, '_blank', 'noopener'); };
  return el;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- drag & drop: cards ---------- */
let dragId=null, dragFromCat=null;
function setupGridDnD(grid, catId){
  grid.addEventListener('dragover', e=>{
    if(!dragId) return; e.preventDefault();
    grid.classList.add('dragover');
    const after = afterEl(grid, e.clientX, e.clientY);
    const dragging = document.querySelector('.card.dragging');
    if(!dragging) return;
    const addCard = grid.querySelector('.add-card');
    if(after==null) grid.insertBefore(dragging, addCard);
    else grid.insertBefore(dragging, after);
  });
  grid.addEventListener('dragleave', ()=> grid.classList.remove('dragover'));
  grid.addEventListener('drop', e=>{
    e.preventDefault(); grid.classList.remove('dragover');
    if(!dragId) return;
    commitCardOrder();
  });
}
function afterEl(grid, x, y){
  const cards=[...grid.querySelectorAll('.card:not(.dragging):not(.add-card)')];
  let closest=null, dist=Infinity;
  cards.forEach(c=>{ const r=c.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const d=Math.hypot(x-cx,y-cy); if(d<dist && (y<cy || (Math.abs(y-cy)<r.height/2 && x<cx))){ dist=d; closest=c; } });
  return closest;
}
document.addEventListener('dragstart', e=>{
  const card=e.target.closest('.card:not(.add-card)');
  if(card){ dragId=card.dataset.id; dragFromCat=card.dataset.cat; card.classList.add('dragging'); }
});
document.addEventListener('dragend', e=>{
  const card=e.target.closest('.card'); if(card) card.classList.remove('dragging');
  dragId=null; dragFromCat=null;
  document.querySelectorAll('.grid.dragover').forEach(g=>g.classList.remove('dragover'));
  render();
});
function commitCardOrder(){
  // rebuild data order from DOM
  const newCats = data.cats.map(c=>({...c, tools:[]}));
  document.querySelectorAll('.grid').forEach(grid=>{
    const catId=grid.dataset.cat;
    const target=newCats.find(c=>c.id===catId);
    grid.querySelectorAll('.card:not(.add-card)').forEach(card=>{
      const t=findTool(card.dataset.id); if(t&&target) target.tools.push(t);
    });
  });
  // keep tools that were filtered out (search active)
  if(filter.trim()){
    data.cats.forEach(old=>{
      const nc=newCats.find(c=>c.id===old.id); if(!nc) return;
      old.tools.forEach(t=>{ if(!nc.tools.find(x=>x.id===t.id)) nc.tools.push(t); });
    });
  }
  data.cats=newCats; save(); render();
}
function findTool(id){ for(const c of data.cats){ const t=c.tools.find(x=>x.id===id); if(t) return t; } return null; }

/* ---------- drag & drop: categories ---------- */
let dragCat=null;
function setupCatDnD(sec, catId){
  const handle=sec.querySelector('.cat-handle');
  handle.addEventListener('dragstart', e=>{ dragCat=catId; e.stopPropagation(); sec.style.opacity='.4'; });
  handle.addEventListener('dragend', ()=>{ dragCat=null; sec.style.opacity=''; });
  sec.addEventListener('dragover', e=>{
    if(!dragCat || dragCat===catId) return; e.preventDefault();
  });
  sec.addEventListener('drop', e=>{
    if(!dragCat || dragCat===catId) return; e.preventDefault();
    const from=data.cats.findIndex(c=>c.id===dragCat);
    const to=data.cats.findIndex(c=>c.id===catId);
    const [m]=data.cats.splice(from,1); data.cats.splice(to,0,m);
    save(); render();
  });
}

/* ---------- tool modal ---------- */
let editingTool=null, editingToolCat=null;
const toolOv=document.getElementById('toolOv');
function openTool(id, catId){
  editingTool=id; editingToolCat=catId;
  const sel=document.getElementById('t_cat'); sel.innerHTML='';
  data.cats.forEach(c=> sel.add(new Option(`${c.emoji} ${c.name}`, c.id)));
  document.getElementById('emojiPick').innerHTML = EMOJIS.map(e=>`<span>${e}</span>`).join('');
  document.querySelectorAll('#emojiPick span').forEach(s=> s.onclick=()=>document.getElementById('t_icon').value=s.textContent);
  if(id){
    const t=findTool(id);
    document.getElementById('toolTitle').textContent='ツールを編集';
    document.getElementById('t_name').value=t.name;
    document.getElementById('t_url').value=t.url;
    document.getElementById('t_desc').value=t.desc||'';
    document.getElementById('t_icon').value=t.icon||'';
    sel.value=catId;
    document.getElementById('t_delete').style.display='block';
  }else{
    document.getElementById('toolTitle').textContent='ツールを追加';
    ['t_name','t_url','t_desc','t_icon'].forEach(i=>document.getElementById(i).value='');
    sel.value=catId||data.cats[0]?.id;
    document.getElementById('t_delete').style.display='none';
  }
  toolOv.classList.add('show');
  setTimeout(()=>document.getElementById('t_name').focus(),50);
}
document.getElementById('t_cancel').onclick=()=>toolOv.classList.remove('show');
document.getElementById('t_save').onclick=()=>{
  const name=document.getElementById('t_name').value.trim();
  let url=document.getElementById('t_url').value.trim();
  if(!name){ toast('名前を入力してください'); return; }
  if(url && !/^https?:\/\//i.test(url) && !url.startsWith('/')) url='https://'+url;
  const desc=document.getElementById('t_desc').value.trim();
  const icon=document.getElementById('t_icon').value.trim();
  const newCat=document.getElementById('t_cat').value;
  if(editingTool){
    const t=findTool(editingTool);
    Object.assign(t,{name,url,desc,icon});
    if(newCat!==editingToolCat){
      const oc=data.cats.find(c=>c.id===editingToolCat); oc.tools=oc.tools.filter(x=>x.id!==t.id);
      data.cats.find(c=>c.id===newCat).tools.push(t);
    }
  }else{
    data.cats.find(c=>c.id===newCat).tools.push({id:uid(),name,url,desc,icon});
  }
  save(); render(); toolOv.classList.remove('show'); toast('保存しました');
};
document.getElementById('t_delete').onclick=()=>{
  if(!confirm('このツールを削除しますか？')) return;
  const oc=data.cats.find(c=>c.id===editingToolCat); oc.tools=oc.tools.filter(x=>x.id!==editingTool);
  save(); render(); toolOv.classList.remove('show'); toast('削除しました');
};

/* ---------- category modal ---------- */
let editingCat=null;
const catOv=document.getElementById('catOv');
function openCat(id){
  editingCat=id;
  document.getElementById('catEmojiPick').innerHTML = EMOJIS.map(e=>`<span>${e}</span>`).join('');
  document.querySelectorAll('#catEmojiPick span').forEach(s=> s.onclick=()=>document.getElementById('c_emoji').value=s.textContent);
  if(id){
    const c=data.cats.find(x=>x.id===id);
    document.getElementById('catTitle').textContent='カテゴリを編集';
    document.getElementById('c_emoji').value=c.emoji||'';
    document.getElementById('c_name').value=c.name;
    document.getElementById('c_delete').style.display='block';
  }else{
    document.getElementById('catTitle').textContent='カテゴリを追加';
    document.getElementById('c_emoji').value='📁';
    document.getElementById('c_name').value='';
    document.getElementById('c_delete').style.display='none';
  }
  catOv.classList.add('show');
  setTimeout(()=>document.getElementById('c_name').focus(),50);
}
document.getElementById('addCatBtn').onclick=()=>openCat(null);
document.getElementById('c_cancel').onclick=()=>catOv.classList.remove('show');
document.getElementById('c_save').onclick=()=>{
  const name=document.getElementById('c_name').value.trim();
  const emoji=document.getElementById('c_emoji').value.trim()||'📁';
  if(!name){ toast('カテゴリ名を入力してください'); return; }
  if(editingCat){ const c=data.cats.find(x=>x.id===editingCat); c.name=name; c.emoji=emoji; }
  else data.cats.push({id:uid(),emoji,name,tools:[]});
  save(); render(); catOv.classList.remove('show'); toast('保存しました');
};
document.getElementById('c_delete').onclick=()=>{
  const c=data.cats.find(x=>x.id===editingCat);
  if(c.tools.length && !confirm(`「${c.name}」内の${c.tools.length}件のツールも削除されます。よろしいですか？`)) return;
  if(!c.tools.length && !confirm('このカテゴリを削除しますか？')) return;
  data.cats=data.cats.filter(x=>x.id!==editingCat);
  save(); render(); catOv.classList.remove('show'); toast('削除しました');
};

/* edit category via header button (delegated) */
main.addEventListener('click', e=>{
  const b=e.target.closest('[data-act="editcat"]'); if(!b) return;
  openCat(b.closest('.cat').dataset.cat);
});

/* ---------- header actions ---------- */
document.getElementById('search').oninput=e=>{ filter=e.target.value; render(); };
document.getElementById('themeBtn').onclick=()=>{ data.theme=data.theme==='dark'?'light':'dark'; save(); render(); };
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const d=new Date(); const ymd=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  a.download='tool-portal-backup-'+ymd+'.json'; a.click(); toast('バックアップを書き出しました');
};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ const v=JSON.parse(r.result);
    if(!v || !Array.isArray(v.cats)){ toast('読み込みに失敗しました'); return; }
    v.cats=v.cats.filter(c=> c && typeof c==='object' && !Array.isArray(c));
    v.cats.forEach(c=>{ if(!Array.isArray(c.tools)) c.tools=[]; });
    if(confirm('現在の内容を読み込んだ内容で置き換えます。よろしいですか？')){ data=v; save(); render(); toast('復元しました'); } }
    catch(err){ toast('読み込みに失敗しました'); } };
  r.readAsText(f); e.target.value='';
};
document.querySelectorAll('.ov').forEach(ov=> ov.onclick=e=>{ if(e.target===ov) ov.classList.remove('show'); });
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ document.querySelectorAll('.ov.show').forEach(o=>o.classList.remove('show')); return; }
  // モーダル内でEnter → 保存（textarea除く）
  if(e.key==='Enter' && e.target.tagName==='INPUT'){
    if(toolOv.classList.contains('show')){ e.preventDefault(); document.getElementById('t_save').click(); }
    else if(catOv.classList.contains('show')){ e.preventDefault(); document.getElementById('c_save').click(); }
  }
  // どこでも「/」で検索へ
  if(e.key==='/' && !['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)){
    e.preventDefault(); document.getElementById('search').focus();
  }
});

render();
</script>
</body>
